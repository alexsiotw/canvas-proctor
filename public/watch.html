<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Proctor Gateway - Secure Video Playback</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { padding: 40px; text-align: center; background: #0f172a; color: white; }
        video { max-width: 100%; height: 75vh; border: 4px solid var(--border); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: #000; }
        .controls { margin-top: 20px; }
        #status { margin-bottom: 20px; color: var(--text-secondary); font-family: monospace; }
    </style>
</head>
<body>
    <h1>Exam Session Playback Vault</h1>
    <p id="status">Establishing secure database handshake...</p>
    
    <video id="player" controls poster="/css/loading.gif"></video>
    
    <div class="controls">
        <button id="btn-download" class="btn" style="background:var(--primary); color:white; display:none;" onclick="downloadRaw()">⬇️ Download Raw .webm</button>
        <button class="btn" onclick="window.close()" style="background:var(--danger); color:white;">Exit Player</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');
        const video = document.getElementById('player');
        const status = document.getElementById('status');
        let currentBlob = null;
        
        video.onerror = () => {
            const error = video.error;
            status.innerText = `Hardware Decoding Error (${error.code}): ${error.message}. Please use the Download button below.`;
        };

        async function loadVideo() {
            try {
                if(!sessionId) throw new Error("No session ID specified.");
                status.innerText = "Querying PostgreSQL chunk table...";
                
                const res = await fetch(`/api/session/video-playback/${sessionId}`);
                if(!res.ok) throw new Error((await res.json()).error || "Database rejection.");
                const data = await res.json();
                
                if(!data.chunks || data.chunks.length === 0) {
                    status.innerText = "Error: Video chunk pool is empty. Authentication likely dropped before stream began.";
                    return;
                }
                
                status.innerText = `Aggregating ${data.chunks.length} raw baseline fragments...`;
                
                const binaryChunks = [];
                for(let b64 of data.chunks) {
                    try {
                        const dataUrl = b64.startsWith('data:') ? b64 : `data:video/webm;base64,${b64}`;
                        const response = await fetch(dataUrl);
                        const buffer = await response.arrayBuffer();
                        binaryChunks.push(new Uint8Array(buffer));
                    } catch (decodeErr) {
                        console.error("Chunk decode failed", decodeErr);
                    }
                }
                
                // Use explicit type with codecs to help the browser parse the concatenated stream
                currentBlob = new Blob(binaryChunks, { type: 'video/webm; codecs="vp8, opus"' });
                video.src = URL.createObjectURL(currentBlob);
                
                document.getElementById('btn-download').style.display = 'inline-block';
                status.innerText = `Virtual stream compiled. Stitched File Size: ${(currentBlob.size / 1024 / 1024).toFixed(2)} MB.`;
                
                // Attempt to prime the hardware decoder
                video.onloadedmetadata = () => {
                    if (video.duration === Infinity) {
                        status.innerText += " (Seeking enabled to fix duration)";
                        video.currentTime = 1e101;
                        video.ontimeupdate = function() {
                            this.ontimeupdate = () => {};
                            video.currentTime = 0;
                        };
                    }
                };
            } catch(e) {
                status.innerText = 'Critical Failure: ' + e.message;
            }
        }

        function downloadRaw() {
            if (!currentBlob) return;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(currentBlob);
            a.download = `Exam_Session_${sessionId}.webm`;
            a.click();
        }
        
        loadVideo();
    </script>
</body>
</html>
