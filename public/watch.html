<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Proctor Gateway - Secure Video Playback</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { padding: 40px; text-align: center; background: #0f172a; color: white; }
        video { max-width: 100%; height: 75vh; border: 4px solid var(--border); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: #000; }
        .controls { margin-top: 20px; }
        #status { margin-bottom: 20px; color: var(--text-secondary); font-family: monospace; }
    </style>
</head>
<body>
    <h1>Exam Session Playback Vault</h1>
    <p id="status">Establishing secure database handshake...</p>
    
    <video id="player" controls autoplay poster="/css/loading.gif"></video>
    
    <div class="controls">
        <div id="playlist-status" style="margin-bottom:10px; font-size: 14px; color: var(--primary); font-family:monospace;">Ready to play session.</div>
        <button id="btn-download" class="btn" style="background:var(--primary); color:white; display:none;">⬇️ Download Full Recording (.zip export recommended)</button>
        <button class="btn" onclick="window.close()" style="background:var(--danger); color:white;">Exit Player</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');
        const video = document.getElementById('player');
        const status = document.getElementById('status');
        const playlistStatus = document.getElementById('playlist-status');
        
        let totalChunks = 0;
        let currentChunkIndex = 1;

        video.onerror = () => {
            console.error("Playback error on chunk", currentChunkIndex);
            // If a chunk fails, try to skip to the next one instead of crashing
            if (currentChunkIndex < totalChunks) {
                status.innerText = `Warning: Segment ${currentChunkIndex} was unplayable. Skipping...`;
                playNextChunk();
            } else {
                status.innerText = "Playback ended with errors.";
            }
        };

        async function initPlaylist() {
            try {
                if(!sessionId) throw new Error("No session ID specified.");
                status.innerText = "Querying playlist metadata...";
                
                // Fetch the list of chunks available for this session
                const res = await fetch(`/api/session/video-chunks-list/${sessionId}`);
                if(!res.ok) throw new Error("Could not retrieve playlist metadata.");
                const data = await res.json();
                
                totalChunks = data.chunk_count;
                if(totalChunks === 0) {
                    status.innerText = "Error: No recordings found in the vault for this session.";
                    return;
                }

                status.innerText = `Secured ${totalChunks} recording fragments. Starting review player...`;
                document.getElementById('btn-download').style.display = 'inline-block';
                document.getElementById('btn-download').onclick = () => {
                    // Redirect to the ZIP export which is the safest way to get the full video
                    window.open(`/api/exams/export-all/${sessionId}`, '_blank');
                };

                playChunk(1);
            } catch(e) {
                status.innerText = 'Critical Failure: ' + e.message;
            }
        }

        function playChunk(index) {
            currentChunkIndex = index;
            const streamUrl = `/api/session/video-chunk/${sessionId}/${index}`;
            
            playlistStatus.innerText = `PLAYING FRAGMENT: ${index} of ${totalChunks}`;
            video.src = streamUrl;
            video.load();
            video.play().catch(e => {
                console.warn("Auto-play blocked", e);
                status.innerText = "Click Play to begin review.";
            });
        }

        video.onended = () => {
            playNextChunk();
        };

        function playNextChunk() {
            if (currentChunkIndex < totalChunks) {
                playChunk(currentChunkIndex + 1);
            } else {
                status.innerText = "Finalized Session Playback.";
                playlistStatus.innerText = "END OF RECORDING.";
            }
        }
        
        initPlaylist();
    </script>
</body>
</html>
