<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Proctor Gateway - Secure Video Playback</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        body { padding: 40px; text-align: center; background: #0f172a; color: white; }
        video { max-width: 100%; height: 75vh; border: 4px solid var(--border); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: #000; }
        .controls { margin-top: 20px; }
        #status { margin-bottom: 20px; color: var(--text-secondary); font-family: monospace; }
    </style>
</head>
<body>
    <h1>Exam Session Playback Vault</h1>
    <p id="status">Establishing secure database handshake...</p>
    
    <video id="player" controls poster="/css/loading.gif"></video>
    
    <div class="controls">
        <button id="btn-download" class="btn" style="background:var(--primary); color:white; display:none;" onclick="downloadRaw()">⬇️ Download Raw .webm</button>
        <button class="btn" onclick="window.close()" style="background:var(--danger); color:white;">Exit Player</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');
        const video = document.getElementById('player');
        const status = document.getElementById('status');
        let currentBlob = null;
        
        video.onerror = () => {
            const error = video.error;
            status.innerText = `Hardware Decoding Error (${error.code}): ${error.message}. Please use the Download button below and open locally in VLC.`;
            status.style.color = "var(--danger)";
        };

        async function loadVideo() {
            try {
                if(!sessionId) throw new Error("No session ID specified.");
                status.innerText = "Connecting to proctoring vault stream...";
                
                const streamUrl = `/api/session/video-playback/${sessionId}`;
                video.src = streamUrl;
                
                // Allow direct download via the same binary stream
                const btnDownload = document.getElementById('btn-download');
                btnDownload.style.display = 'inline-block';
                btnDownload.onclick = () => {
                    const a = document.createElement('a');
                    a.href = streamUrl;
                    a.download = `Exam_Session_${sessionId}.webm`;
                    a.click();
                };
                
                video.onloadedmetadata = () => {
                    status.innerText = "Stream active. Synchronizing playback...";
                    // Handle WebM duration issue in Chromium
                    if (video.duration === Infinity) {
                        video.currentTime = 1e101;
                        video.ontimeupdate = function() {
                            this.ontimeupdate = () => {};
                            video.currentTime = 0;
                            status.innerText = "Ready for review.";
                        };
                    } else {
                        status.innerText = "Ready for review.";
                    }
                };
            } catch(e) {
                status.innerText = 'Critical Failure: ' + e.message;
            }
        }
        
        loadVideo();
    </script>
</body>
</html>
