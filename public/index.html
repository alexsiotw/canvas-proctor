<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Proctor Gateway Teacher Dashboard">
  <title>Proctor Gateway</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="/socket.io/socket.io.js"></script>
</head>

<body>
  <div class="app-container" id="app">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="logo">
        <div class="logo-icon">👁️</div>
        <span>Proctor Gateway</span>
      </div>
      <div class="user-info">
        <span id="user-name">Instructor</span>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="nav-bar" id="nav-bar">
      <a class="nav-item active" data-page="exams" onclick="navigate('exams')">Exams Config</a>
      <a class="nav-item" data-page="live" onclick="navigate('live')">Live Monitoring</a>
      <a class="nav-item" data-page="reports" onclick="navigate('reports')">Reports</a>
    </nav>

    <!-- Main Content -->
    <div class="main-content" id="content">
      <div class="spinner" style="margin: 40px auto;"></div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-content"></div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px;"></div>

  <!-- Fullscreen Img View for Live -->
  <div class="modal-overlay" id="image-overlay" onclick="closeImage()">
      <img id="fullscreen-image" style="max-width: 90%; max-height: 90%; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);" />
  </div>

  <script src="/js/app.js"></script>
</body>

</html>
